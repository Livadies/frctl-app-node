name: FRCTL Hub

on:
  push:
    paths: ["hub/**", "app/**", "gradle/**", "*.gradle.kts", "gradlew*", ".github/workflows/hub.yml"]
  pull_request:
    paths: ["hub/**", "app/**", "gradle/**", "*.gradle.kts", "gradlew*", ".github/workflows/hub.yml"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Unit and HTTP tests
        working-directory: hub/space
        run: python -m unittest discover -s tests -v
      - name: FRCTL Node unit and HTTP tests
        working-directory: hub/node
        run: python -m unittest discover -s tests -v
      - name: Check FRCTL Node browser code
        working-directory: hub/node
        run: node --check static/app.js
      - name: Check Hugging Face static browser code
        run: node --check hub/hf-static/app.js
      - name: Build the Hugging Face Docker image
        run: docker build --tag frctl-hub:test hub/space

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Test and build debug APK
        run: ./gradlew testDebugUnitTest assembleDebug
